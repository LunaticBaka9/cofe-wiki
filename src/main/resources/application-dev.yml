server:
    port: 8081

spring:
    devtools:
        restart:
            enabled: true
            additional-paths: src/main/java
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 10MB
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        username: root
        password: root
        url: jdbc:mysql://localhost:3306/maid-coffee?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    jackson:
        date-format: yyyy-MM-dd HH:mm:ss

mybatis:
    mapper-locations: classpath:mapper/*.xml
    configuration:
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
        map-underscore-to-camel-case: true
    type-aliases-package: com.maid_coffee.entity

jwt:
    # 密钥，生产环境请使用更复杂且长度至少为32位的字符串
    secret: AjnsdifKloiDnlaMvkdiOlakdFkaPlnisoAndkflODNFoakdND
    # Token过期时间，单位：毫秒 (例如：2小时 = 2 * 60 * 60 * 1000)
    expiration: 7200000
    # Token在请求头中的前缀
    token-prefix: Bearer
    # 存放Token的请求头名称
    header: Authorization
